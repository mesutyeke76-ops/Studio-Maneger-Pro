<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Studio | Dinamik Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --accent: #00f2ff;
            --text: #ffffff; --muted: #8e8e93; --border: #2c2c2e;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; 
            background-color: var(--bg); color: var(--text); padding-bottom: 100px;
        }

        /* --- SPLASH --- */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .n-logo { width: 70px; height: 70px; border: 3px solid var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: 800; color: var(--accent); }

        /* --- GENEL TASARIM --- */
        .header { padding: 50px 20px 10px; display: flex; align-items: center; gap: 15px; }
        .glass-card { background: var(--card); border-radius: 24px; padding: 20px; margin: 15px; border: 1px solid var(--border); }
        
        /* --- DİYET & KALORİ --- */
        .calorie-circle {
            width: 180px; height: 180px; margin: 20px auto; border-radius: 50%;
            background: conic-gradient(var(--accent) var(--p, 0deg), #2c2c2e 0);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .calorie-circle::after { content: ""; position: absolute; inset: 12px; background: var(--bg); border-radius: 50%; }
        .c-data { position: relative; z-index: 2; text-align: center; }

        /* --- INPUTS --- */
        input, textarea, select {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px;
            border: 1px solid var(--border); background: #2c2c2e; color: white; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px;
            border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer;
        }

        /* --- NAV --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; padding: 12px 0 35px; border-top: 1px solid var(--border);
        }
        .nav-tab { background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; }
        .nav-tab.active { color: var(--accent); }

        .page { display: none; padding: 10px; }
        .active-page { display: block; animation: fade 0.3s ease; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="n-logo">N</div>
        <h2 style="margin-top:20px; letter-spacing:3px;">NOVA STUDIO</h2>
    </div>

    <div id="p-admin" class="page active-page">
        <div class="header">
            <h2 style="margin:0">Eğitmen Paneli</h2>
        </div>
        
        <div class="glass-card">
            <h3>Diyet Listesi Gönder</h3>
            <select id="targetMember">
                <option value="">Üye Seçin...</option>
                <option value="Uye1">Yeni Üye #1</option>
            </select>
            <textarea id="dietContent" rows="4" placeholder="Diyet listesini buraya yazın..."></textarea>
            <button class="btn" onclick="sendDiet()">Listeyi Gönder</button>
        </div>

        <div class="glass-card">
            <h3>Üye Listesi</h3>
            <div id="memberList" style="color:var(--muted); font-size:14px;">Henüz kayıtlı üye yok.</div>
        </div>
    </div>

    <div id="p-diet" class="page">
        <div class="header">
            <h2 style="margin:0">Kalori Takibi</h2>
        </div>

        <div class="calorie-circle" id="wheel">
            <div class="c-data">
                <div style="font-size:11px; color:var(--muted)">Alınan</div>
                <div style="font-size:32px; font-weight:800;"><span id="curCal">0</span></div>
                <div style="font-size:11px; color:var(--accent)">Hedef 2200</div>
            </div>
        </div>

        <div class="glass-card">
            <h3>Besin Ekle</h3>
            <input type="text" id="foodName" placeholder="Ne yedin?">
            <input type="number" id="foodCal" placeholder="Kalori">
            <button class="btn" onclick="addCalorie()">Ekle</button>
        </div>

        <div class="glass-card">
            <h3>Eğitmenimden Diyet Listesi</h3>
            <div id="receivedDiet" style="background:#2c2c2e; padding:15px; border-radius:12px; font-size:14px; color:#00f2ff; min-height:50px;">
                Henüz bir liste gönderilmedi.
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-tab active" onclick="showP('p-admin', this)"><span>🏠</span>Eğitmen</button>
        <button class="nav-tab" onclick="showP('p-diet', this)"><span>🍎</span>Diyetim</button>
        <button class="nav-tab"><span>📅</span>Takvim</button>
        <button class="nav-tab"><span>👤</span>Profil</button>
    </nav>

    <script>
        // Splash
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);

        let currentCalories = 0;
        const goal = 2200;

        // Diyet Gönder (Simülasyon)
        function sendDiet() {
            const content = document.getElementById('dietContent').value;
            if(!content) return alert("Lütfen liste içeriğini yazın.");
            
            localStorage.setItem('activeDiet', content);
            alert("Diyet listesi üyeye başarıyla gönderildi!");
            document.getElementById('dietContent').value = '';
            loadDiet();
        }

        // Diyet Yükle
        function loadDiet() {
            const diet = localStorage.getItem('activeDiet');
            if(diet) {
                document.getElementById('receivedDiet').innerText = diet;
            }
        }

        // Kalori Ekle
        function addCalorie() {
            const cal = parseInt(document.getElementById('foodCal').value);
            if(!cal) return;

            currentCalories += cal;
            document.getElementById('curCal').innerText = currentCalories;
            
            // Halka ilerlemesi hesapla (360 derece üzerinden)
            const percent = Math.min((currentCalories / goal) * 360, 360);
            document.getElementById('wheel').style.setProperty('--p', percent + 'deg');
            
            document.getElementById('foodCal').value = '';
            document.getElementById('foodName').value = '';
        }

        function showP(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            btn.classList.add('active');
            if(id === 'p-diet') loadDiet();
        }
    </script>
</body>
</html>
