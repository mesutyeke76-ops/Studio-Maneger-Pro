<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Pilates QR Seans Takip Sistemi</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f0f0; }
    #splash { display:flex; align-items:center; justify-content:center; height:100vh; background:#fff; }
    #login { display:none; padding:40px; max-width:400px; margin:50px auto; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align:center; }
    input, select, button { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:4px; }
    button { background:#4CAF50; color:#fff; border:none; cursor:pointer; }
    button:hover { background:#45a049; }
    #message { margin-top:15px; text-align:center; font-weight:bold; }
  </style>
</head>
<body>
  <!-- Açılış Animasyonu -->
  <div id="splash">
    <h1>🏋️ Pilates QR Sistemi</h1>
  </div>

  <!-- Giriş Ekranı -->
  <div id="login">
    <h1 id="title">Giriş Yap</h1>
    <select id="lang">
      <option value="tr">Türkçe</option>
      <option value="en">English</option>
    </select>
    <input type="text" id="username" placeholder="Kullanıcı Adı / Telefon">
    <input type="password" id="password" placeholder="Şifre">
    <button onclick="login()">Giriş</button>
    <div id="message"></div>
  </div>

  <script>
    // Açılış animasyonu simülasyonu
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('login').style.display = 'block';
    }, 2000);

    // Dil seçeneği
    document.getElementById('lang').addEventListener('change', function() {
      if (this.value === 'en') {
        document.getElementById('title').innerText = "Login";
        document.getElementById('username').placeholder = "Username / Phone";
        document.getElementById('password').placeholder = "Password";
        document.querySelector('button').innerText = "Login";
      } else {
        document.getElementById('title').innerText = "Giriş Yap";
        document.getElementById('username').placeholder = "Kullanıcı Adı / Telefon";
        document.getElementById('password').placeholder = "Şifre";
        document.querySelector('button').innerText = "Giriş";
      }
    });

    // Giriş kontrolü
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const msg = document.getElementById('message');

      if (user === "admin" && pass === "Mesut.4848") {
        msg.innerText = "Yönetici girişi başarılı!";
        msg.style.color = "green";
      } else if (pass === user) {
        msg.innerText = "Üye girişi başarılı!";
        msg.style.color = "green";
      } else {
        msg.innerText = "Hatalı giriş!";
        msg.style.color = "red";
      }
    }
  </script>
</body>
</html>
