<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gym CORE Pro | Secure Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* Önceki stillere ek olarak Login ekranı stili */
        #login-screen {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 350px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="dark-mode">

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:#0f172a">Yönetici Girişi</h2>
            <input type="email" id="login-email" placeholder="E-posta" style="width:100%; margin-bottom:10px;">
            <input type="password" id="login-pass" placeholder="Şifre" style="width:100%; margin-bottom:20px;">
            <button class="btn btn-primary" style="width:100%" onclick="login()">Giriş Yap</button>
            <p id="login-error" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav>
            <h2>⚡ GYM CORE</h2>
            <button onclick="logout()" style="color:var(--danger)">🚪 Çıkış Yap</button>
        </nav>
        </div>

<script>
    // 1. ADIM: Firebase Ayarları (Burayı kendi bilgilerinizle doldurmalısınız)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase'i başlat
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 2. ADIM: Güvenlik Kontrolü (Oturum yönetimi)
    auth.onAuthStateChanged(user => {
        if (user) {
            // Kullanıcı giriş yapmışsa uygulamayı göster
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("app-content").classList.remove("hidden");
            loadDataFromCloud(); // Verileri buluttan çek
        } else {
            // Giriş yapılmamışsa giriş ekranını göster
            document.getElementById("login-screen").classList.remove("hidden");
            document.getElementById("app-content").classList.add("hidden");
        }
    });

    // 3. ADIM: Giriş Fonksiyonu
    async function login() {
        const email = document.getElementById("login-email").value;
        const pass = document.getElementById("login-pass").value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch (error) {
            document.getElementById("login-error").innerText = "Hatalı giriş denemesi!";
        }
    }

    // 4. ADIM: Verileri Buluta Kaydetme (Localstorage yerine)
    async function addMemberToCloud(member) {
        try {
            await db.collection("members").add({
                ...member,
                userId: auth.currentUser.uid, // Veriyi bu kullanıcıya kilitle
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch (e) {
            alert("Veri kaydedilirken hata oluştu: " + e.message);
        }
    }

    // Çıkış Yap
    function logout() { auth.signOut(); }
</script>
</body>
</html>
