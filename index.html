<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Studio Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #0b0b0c; --card: #161618; --accent: #d2fe00;
            --text: #ffffff; --muted: #a1a1a6; --border: #2c2c2e; --danger: #ff453a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 30px; }

        /* --- GİRİŞ EKRANI (AUTH) --- */
        #auth-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-card { width: 100%; max-width: 400px; text-align: center; }
        .logo-big { width: 70px; height: 70px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: 800; color: black; margin: 0 auto 20px; }
        
        /* --- GENEL TASARIM --- */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; display: none; }
        .card { background: var(--card); border-radius: 24px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); }
        input { width: 100%; padding: 16px; margin-top: 10px; border-radius: 15px; border: 1px solid var(--border); background: #1c1c1e; color: white; font-size: 16px; }
        .btn { width: 100%; padding: 16px; margin-top: 12px; border-radius: 16px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        
        /* --- ÜYE PANELİ ÖZEL --- */
        .member-header { text-align: center; margin-bottom: 30px; }
        .qr-box { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 20px 0; }
        .session-badge { font-size: 40px; font-weight: 800; color: var(--accent); display: block; }
        
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22,22,24,0.95); backdrop-filter: blur(30px); display: none; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); }
        .nav-item { color: var(--muted); text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; margin-top: 15px; border: 2px solid var(--accent) !important; }
    </style>
</head>
<body>

<div id="auth-page">
    <div class="auth-card">
        <div class="logo-big">S</div>
        <h2 style="margin-bottom: 5px;">Studio Manager Pro</h2>
        <p style="color: var(--muted); font-size: 14px; margin-bottom: 30px;">Lütfen giriş yapın</p>
        
        <input type="password" id="loginKey" placeholder="Şifre veya Telefon No">
        <button class="btn" onclick="app.login()">Giriş Yap</button>
        <p style="font-size: 12px; color: var(--muted); margin-top: 20px;">Yönetici şifresi: 1234</p>
    </div>
</div>

<div id="admin-panel" class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Yönetici Paneli</h2>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-size:12px;">Çıkış Yap</button>
    </div>

    <div class="card" style="text-align:center;">
        <b>Kamera ile Seans Düş</b>
        <div id="reader"></div>
        <button class="btn" id="btn-cam" onclick="app.startScanner()">📷 Kamerayı Başlat</button>
    </div>

    <h3>Üye Kayıt</h3>
    <div class="card">
        <input type="text" id="mName" placeholder="Ad Soyad">
        <input type="tel" id="mPhone" placeholder="Telefon (Giriş için)">
        <input type="number" id="mSess" placeholder="Seans Tanımla">
        <button class="btn" onclick="app.addMember()">Üyeyi Kaydet</button>
    </div>

    <h3>Tüm Üyeler</h3>
    <div id="admin-member-list"></div>
</div>

<div id="member-panel" class="container">
    <div class="member-header">
        <div class="logo-big" style="width:50px; height:50px; font-size:25px;">S</div>
        <h2 id="user-welcome">Merhaba!</h2>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-size:12px;">Güvenli Çıkış</button>
    </div>

    <div class="card" style="text-align: center;">
        <span style="font-size: 14px; color: var(--muted);">KALAN SEANSINIZ</span>
        <span class="session-badge" id="user-sessions">0</span>
    </div>

    <div class="card" style="text-align: center;">
        <b>Giriş QR Kodunuz</b><br>
        <div class="qr-box" id="user-qrcode"></div>
        <p style="font-size: 12px; color: var(--muted);">Ders başlangıcında hocanıza okutun.</p>
    </div>

    <div class="card">
        <b>Size Özel Diyet Notu:</b>
        <p id="user-diet" style="font-size: 14px; color: var(--muted); margin-top: 10px;">Günde en az 2.5 litre su içmeyi unutmayın!</p>
    </div>
</div>

<script>
const app = {
    db: JSON.parse(localStorage.getItem('sm_pro_final_v10')) || { members: [] },
    currentUser: null,

    login() {
        const key = document.getElementById('loginKey').value;
        
        // 1. Yönetici Girişi
        if(key === "1234") {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            this.renderAdminMembers();
            return;
        }

        // 2. Üye Girişi (Telefon numarası ile)
        const member = this.db.members.find(m => m.phone === key);
        if(member) {
            this.currentUser = member;
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('member-panel').style.display = 'block';
            this.renderMemberPanel();
        } else {
            alert("Hatalı şifre veya kayıtlı olmayan telefon numarası!");
        }
    },

    // --- YÖNETİCİ FONKSİYONLARI ---
    addMember() {
        const name = document.getElementById('mName').value;
        const phone = document.getElementById('mPhone').value;
        const sess = parseInt(document.getElementById('mSess').value) || 0;

        if(!name || !phone) return alert("Bilgileri eksiksiz girin!");

        this.db.members.push({ id: Date.now(), name, phone, sessions: sess });
        this.save();
        this.renderAdminMembers();
        document.getElementById('mName').value = ""; document.getElementById('mPhone').value = ""; document.getElementById('mSess').value = "";
    },

    renderAdminMembers() {
        const list = document.getElementById('admin-member-list');
        list.innerHTML = "";
        this.db.members.forEach(m => {
            list.innerHTML += `
                <div class="card">
                    <b>${m.name}</b><br>
                    <small>Tel: ${m.phone} | Seans: ${m.sessions}</small>
                    <button class="btn" style="background:var(--danger); color:white; padding:5px; font-size:10px; width:auto; margin-left:10px;" onclick="app.deleteMember(${m.id})">Sil</button>
                </div>`;
        });
    },

    deleteMember(id) {
        if(confirm("Üyeyi silmek istiyor musunuz?")) {
            this.db.members = this.db.members.filter(m => m.id !== id);
            this.save(); this.renderAdminMembers();
        }
    },

    startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render((text) => {
            const memberId = text.split('-')[1];
            const m = this.db.members.find(x => x.id == memberId);
            if(m && m.sessions > 0) {
                m.sessions--;
                this.save();
                alert("Seans düşüldü: " + m.name + "\nKalan: " + m.sessions);
                scanner.clear();
                document.getElementById('reader').style.display = 'none';
                this.renderAdminMembers();
            } else {
                alert("Hata: Seans yetersiz veya üye bulunamadı!");
            }
        });
    },

    // --- ÜYE FONKSİYONLARI ---
    renderMemberPanel() {
        document.getElementById('user-welcome').innerText = "Merhaba, " + this.currentUser.name;
        document.getElementById('user-sessions').innerText = this.currentUser.sessions;
        document.getElementById('user-qrcode').innerHTML = "";
        new QRCode(document.getElementById("user-qrcode"), {
            text: "ID-" + this.currentUser.id,
            width: 150,
            height: 150
        });
    },

    save() { localStorage.setItem('sm_pro_final_v10', JSON.stringify(this.db)); }
};
</script>
</body>
</html>
