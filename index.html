<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diamond Pro | Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #d2fe00; /* Resimlerdeki o özel sarı-yeşil tonu */
            --text: #ffffff;
            --muted: #8e8e93;
            --border: #2c2c2e;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* --- UI BİLEŞENLERİ (RESİMDEKİ GİBİ) --- */
        
        .header-logo {
            padding: 60px 20px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-circle {
            width: 40px; height: 40px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--accent);
        }

        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .menu-card {
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid var(--border);
        }

        .icon-box {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        /* --- KALORİ HALKASI MODÜLÜ --- */
        .nutrition-header { text-align: center; padding: 20px; }
        
        .progress-circle {
            position: relative;
            width: 200px; height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            background: conic-gradient(var(--accent) 75%, #2c2c2e 0); /* Örnek %75 doluluk */
            display: flex; align-items: center; justify-content: center;
        }

        .progress-circle::before {
            content: "";
            position: absolute;
            width: 170px; height: 170px;
            background: var(--bg);
            border-radius: 50%;
        }

        .inner-text {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* --- LİSTE TASARIMI (RESİMDEKİ GİBİ) --- */
        .session-item {
            background: var(--card);
            margin: 10px 20px;
            padding: 18px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        /* --- NAVİGASYON (RESİMDEKİ GİBİ) --- */
        .nav-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 15px 0 35px;
            border-top: 1px solid var(--border);
        }

        .nav-item { color: var(--muted); text-align: center; font-size: 10px; border:none; background:none; }
        .nav-item.active { color: var(--accent); }
        
        .center-btn {
            width: 55px; height: 55px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: black;
            margin-top: -40px;
            box-shadow: 0 0 20px rgba(210, 254, 0, 0.3);
        }

        .page { display: none; }
        .active-page { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="home" class="page active-page">
    <div class="header-logo">
        <div class="logo-circle">D</div>
        <div>
            <div style="font-weight: 800; font-size: 18px;">Diamond Pro</div>
            <div style="font-size: 12px; color: var(--muted);">Hoş geldin, Yönetici</div>
        </div>
    </div>

    <div class="grid-menu">
        <div class="menu-card" onclick="showP('mems')">
            <div class="icon-box" style="background: #d2fe0022; color: var(--accent);">👥</div>
            Üyeler
        </div>
        <div class="menu-card">
            <div class="icon-box" style="background: #ffb80022; color: #ffb800;">📅</div>
            Seanslar
        </div>
        <div class="menu-card">
            <div class="icon-box" style="background: #007aff22; color: #007aff;">💰</div>
            Finans
        </div>
        <div class="menu-card">
            <div class="icon-box" style="background: #ff2d5522; color: #ff2d55;">🏋️</div>
            Eğitmenler
        </div>
    </div>

    <div style="padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
        <h3>Bugünkü Seanslar</h3>
        <span style="color: var(--accent); font-size: 12px;">Takvim ></span>
    </div>

    <div class="session-item">
        <div>
            <div style="font-weight: 600;">Mahmut Tozkoparan</div>
            <div style="font-size: 12px; color: var(--muted);">10:05 - 11:05</div>
        </div>
    </div>
    <div class="session-item">
        <div>
            <div style="font-weight: 600;">Nur Genç</div>
            <div style="font-size: 12px; color: var(--muted);">12:05 - 13:05</div>
        </div>
    </div>
</div>

<div id="diet" class="page">
    <div class="nutrition-header">
        <h2 style="margin-bottom:0">Doğru beslenme ve kalori takibi</h2>
    </div>

    <div class="progress-circle">
        <div class="inner-text">
            <div style="font-size: 12px; color: var(--muted);">Şuanki</div>
            <div style="font-size: 32px; font-weight: 800;">1800 <small style="font-size:14px">kal</small></div>
            <div style="font-size: 11px; color: var(--accent);">Hedef 2136 kal</div>
        </div>
    </div>

    <div style="display: flex; justify-content: space-around; padding: 10px 40px; font-size: 12px;">
        <div style="text-align:center"><div style="color:#007aff">● 41g</div> Karb</div>
        <div style="text-align:center"><div style="color:#ffb800">● 50g</div> Protein</div>
        <div style="text-align:center"><div style="color:#ff2d55">● 40g</div> Yağ</div>
    </div>

    <div class="session-item" style="border:none; margin-top:30px;">
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="font-size:24px">🥗</div>
            <div>
                <div style="font-weight:600">Besin Kalorisi Hesapla</div>
                <div style="font-size:11px; color:var(--muted)">Beslenme</div>
            </div>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="showP('home', this)">
        <div style="font-size:20px">🏠</div>
        Ana Sayfa
    </button>
    <button class="nav-item" onclick="showP('diet', this)">
        <div style="font-size:20px">🍎</div>
        Beslenme
    </button>
    <div class="center-btn">＋</div>
    <button class="nav-item">
        <div style="font-size:20px">📅</div>
        Takvim
    </button>
    <button class="nav-item">
        <div style="font-size:20px">👤</div>
        Profil
    </button>
</nav>

<script>
    function showP(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        if(btn.tagName === 'BUTTON') btn.classList.add('active');
    }
</script>

</body>
</html>
