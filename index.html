<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Studio Pro | V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --accent: #d2fe00;
            --text: #ffffff; --muted: #8e8e93; --border: #2c2c2e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .header { padding: 40px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        
        input, select, textarea { width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; border: 1px solid var(--border); background: #262629; color: white; font-size: 14px; }
        .btn { width: 100%; padding: 16px; margin-top: 15px; border-radius: 16px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; }
        .btn:active { transform: scale(0.98); }

        /* --- CALENDAR GRID --- */
        .calendar-grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); overflow-x: auto; border-radius: 12px; }
        .cal-header { background: var(--card); padding: 10px 2px; text-align: center; font-size: 10px; font-weight: 800; color: var(--accent); position: sticky; top: 0; }
        .cal-cell { background: var(--bg); height: 40px; border: 0.1px solid #111; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        .cal-time { background: var(--card); font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .slot-busy { background: var(--accent) !important; color: black; font-weight: bold; border-radius: 2px; }

        /* --- PROGRESS --- */
        .circle-box { position: relative; width: 160px; height: 160px; margin: 0 auto; }
        svg { transform: rotate(-90deg); width: 160px; height: 160px; }
        .bg-c { stroke: #2c2c2e; fill: none; stroke-width: 10; }
        .fg-c { stroke: var(--accent); fill: none; stroke-width: 10; stroke-dasharray: 440; stroke-dashoffset: 440; transition: 1s ease; stroke-linecap: round; }

        /* --- NAV --- */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--muted); font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="page-home" class="page container active">
    <div class="header">
        <div><h2 style="margin:0">Nova Studio</h2><p id="totalMemberLabel" style="color:var(--muted); font-size:12px;">0 Aktif Üye</p></div>
        <div class="logo-box" style="width:40px; height:40px; border:2px solid var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--accent); font-weight:800;">N</div>
    </div>
    
    <div class="card">
        <h4 style="margin:0">Hızlı Üye Kaydı</h4>
        <input type="text" id="mName" placeholder="Ad Soyad">
        <button class="btn" onclick="app.addMember()">Kaydet</button>
    </div>

    <h3>Günlük Durum</h3>
    <div id="homeSummary"></div>
</div>

<div id="page-finance" class="page container">
    <h3>Finansal Yönetim</h3>
    <div class="card">
        <small style="color:var(--muted)">Toplam Ciro</small>
        <h2 style="font-size:32px; color:var(--accent); margin:5px 0;">₺ <span id="revVal">0</span></h2>
        <canvas id="finChart" style="height:150px;"></canvas>
    </div>

    <div class="card">
        <h4>Yeni Paket Satışı</h4>
        <select id="payMember"></select>
        <select id="payPack">
            <option value="4000|4">4 Seans Paket - ₺4.000</option>
            <option value="7500|8">8 Seans Paket - ₺7.500</option>
            <option value="10500|12">12 Seans Paket - ₺10.500</option>
            <option value="13000|16">16 Seans Paket - ₺13.000</option>
        </select>
        <button class="btn" onclick="app.processPayment()">Ödemeyi Al ve Seans Tanımla</button>
    </div>
</div>

<div id="page-diet" class="page container">
    <h3>Diyet ve Beslenme</h3>
    <div class="card circle-box">
        <svg><circle class="bg-c" cx="80" cy="80" r="70"></circle><circle id="dietProg" class="fg-c" cx="80" cy="80" r="70"></circle></svg>
        <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div id="dCal" style="font-size:24px; font-weight:800;">0</div>
            <small id="dGoal">Hedef: 2000</small>
        </div>
    </div>

    <div class="card">
        <h4>Hazır Diyet Atama</h4>
        <select id="dietTemplate" onchange="app.applyTemplate()">
            <option value="">Liste Seçin...</option>
            <option value="1000">1000 Kalori (Definisyon)</option>
            <option value="1200">1200 Kalori (Hızlı Yağ Yakımı)</option>
            <option value="1500">1500 Kalori (Dengeli)</option>
            <option value="1800">1800 Kalori (Kas Koruma)</option>
        </select>
        <textarea id="dietText" rows="6" readonly style="margin-top:10px; font-size:12px; color:var(--accent);"></textarea>
    </div>
</div>

<div id="page-calendar" class="page active">
    <div class="container" style="padding-bottom:10px;"><h3>Ders Programı</h3></div>
    <div class="calendar-grid" id="calGrid">
        <div class="cal-header">Saat</div>
        <div class="cal-header">Pzt</div><div class="cal-header">Sal</div><div class="cal-header">Çar</div>
        <div class="cal-header">Per</div><div class="cal-header">Cum</div><div class="cal-header">Cmt</div><div class="cal-header">Paz</div>
        </div>
</div>

<div id="page-profile" class="page container">
    <h3>Yönetici Profili</h3>
    <div class="card" style="text-align:center;">
        <div style="width:80px; height:80px; background:var(--accent); border-radius:50%; margin:0 auto 15px; color:black; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800;">A</div>
        <h2 style="margin:0">Admin Nova</h2>
        <p style="color:var(--muted)">Master Trainer</p>
    </div>
    <button class="btn" style="background:#ff3b30; color:white;" onclick="localStorage.clear(); location.reload();">Sistemi Sıfırla</button>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="app.showPage('page-home', this)">🏠<br>Panel</button>
    <button class="nav-btn" onclick="app.showPage('page-finance', this)">💰<br>Finans</button>
    <button class="nav-btn" onclick="app.showPage('page-calendar', this)">📅<br>Takvim</button>
    <button class="nav-btn" onclick="app.showPage('page-diet', this)">🍎<br>Diyet</button>
    <button class="nav-btn" onclick="app.showPage('page-profile', this)">👤<br>Profil</button>
</nav>

<script>
const app = {
    db: JSON.parse(localStorage.getItem('nova_v2_db')) || {
        members: [],
        revenue: 0,
        payments: [],
        busySlots: [] // "gün-saat" formatında: "1-09"
    },

    templates: {
        "1000": "Sabah: 1 Yumurta, 1 Dilim Peynir\nÖğle: Mevsim Salata, 100g Tavuk\nAkşam: Haşlanmış Sebze",
        "1200": "Sabah: 2 Yumurta, Lor Peyniri\nÖğle: 120g Izgara Köfte, Salata\nAkşam: Sebze Çorbası, Yoğurt",
        "1500": "Sabah: Yulaf Ezmesi, Meyve\nÖğle: 150g Balık, Esmer Pirinç\nAkşam: Zeytinyağlı Yemek, Ayran",
        "1800": "Sabah: 3 Yumurta, Zeytin, Tam Tahıllı Ekmek\nÖğle: 200g Tavuk, Makarna\nAkşam: Etli Sebze Yemeği, Pilav"
    },

    init() {
        this.renderCalendar();
        this.updateUI();
    },

    showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        if(id === 'page-finance') this.initChart();
    },

    addMember() {
        const name = document.getElementById('mName').value;
        if(!name) return;
        this.db.members.push({ name, sessions: 0, diet: '', goal: 2000 });
        this.save();
        this.updateUI();
        document.getElementById('mName').value = '';
    },

    processPayment() {
        const mIdx = document.getElementById('payMember').value;
        const [price, count] = document.getElementById('payPack').value.split('|').map(Number);
        if(mIdx === "") return;

        this.db.members[mIdx].sessions += count;
        this.db.revenue += price;
        this.db.payments.push(price);
        this.save();
        this.updateUI();
        alert("Ödeme Alındı! Seanslar Tanımlandı.");
    },

    applyTemplate() {
        const cal = document.getElementById('dietTemplate').value;
        if(!cal) return;
        document.getElementById('dietText').value = this.templates[cal];
        document.getElementById('dGoal').innerText = "Hedef: " + cal;
        const offset = 440 - (0.7 * 440); // Örnek %70 doluluk
        document.getElementById('dietProg').style.strokeDashoffset = offset;
    },

    renderCalendar() {
        const grid = document.getElementById('calGrid');
        // Saatler 07:00 - 22:00
        for(let h = 7; h <= 22; h++) {
            const timeStr = (h < 10 ? '0'+h : h) + ':00';
            grid.innerHTML += `<div class="cal-cell cal-time">${timeStr}</div>`;
            for(let d = 1; d <= 7; d++) {
                const slotId = `${d}-${h}`;
                const isBusy = this.db.busySlots.includes(slotId);
                grid.innerHTML += `<div class="cal-cell ${isBusy?'slot-busy':''}" onclick="app.toggleSlot('${slotId}')">${isBusy?'DOLU':''}</div>`;
            }
        }
    },

    toggleSlot(id) {
        if(this.db.busySlots.includes(id)) {
            this.db.busySlots = this.db.busySlots.filter(s => s !== id);
        } else {
            this.db.busySlots.push(id);
        }
        this.save();
        location.reload(); // Grid'i tazelemek için en basit yol
    },

    updateUI() {
        document.getElementById('totalMemberLabel').innerText = this.db.members.length + " Aktif Üye";
        document.getElementById('revVal').innerText = this.db.revenue.toLocaleString();
        
        // Ödeme Üye Seçimi
        const sel = document.getElementById('payMember');
        sel.innerHTML = '<option value="">Üye Seçiniz...</option>';
        this.db.members.forEach((m, i) => {
            sel.innerHTML += `<option value="${i}">${m.name} (${m.sessions} Seans)</option>`;
        });

        // Home Summary
        document.getElementById('homeSummary').innerHTML = this.db.members.slice(-3).map(m => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>${m.name}</span>
                <span style="color:var(--accent)">${m.sessions} Seans Kaldı</span>
            </div>
        `).join('');
    },

    initChart() {
        const ctx = document.getElementById('finChart').getContext('2d');
        if(window.mChart) window.mChart.destroy();
        window.mChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Hafta 1', 'Hafta 2', 'Hafta 3', 'Hafta 4'],
                datasets: [{ data: [this.db.revenue*0.2, this.db.revenue*0.3, this.db.revenue*0.1, this.db.revenue*0.4], backgroundColor: '#d2fe00' }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    },

    save() { localStorage.setItem('nova_v2_db', JSON.stringify(this.db)); }
};

app.init();
</script>
</body>
</html>
