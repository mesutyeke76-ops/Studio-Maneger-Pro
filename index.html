<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Studio Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0c; --card: #161618; --accent: #d2fe00;
            --text: #ffffff; --muted: #a1a1a6; --border: #2c2c2e; --danger: #ff453a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* --- ÜST BAR --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(11,11,12,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo-area { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-box { width: 35px; height: 35px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: 800; }
        
        .lang-btn { background: var(--card); border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 24px; padding: 22px; margin-bottom: 18px; border: 1px solid var(--border); }

        /* --- ANA SAYFA GÖRÜNÜMÜ --- */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .dash-item { background: var(--card); border-radius: 24px; padding: 30px 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.2s; }
        .dash-item:active { transform: scale(0.95); background: #1c1c1e; }
        .dash-item span { font-size: 24px; }
        .dash-item b { font-size: 14px; color: var(--text); }

        /* --- ALT NAVİGASYON --- */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22,22,24,0.95); backdrop-filter: blur(30px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 999; }
        .nav-item { color: var(--muted); text-align: center; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .nav-item.active { color: var(--accent); opacity: 1; }
        .nav-item div { font-size: 20px; margin-bottom: 4px; }

        /* --- FORM & BUTONLAR --- */
        input, select { width: 100%; padding: 16px; margin-top: 10px; border-radius: 15px; border: 1px solid var(--border); background: #1c1c1e; color: white; font-size: 15px; }
        .btn { width: 100%; padding: 16px; margin-top: 12px; border-radius: 16px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; }

        /* --- MODAL & PAGES --- */
        .page { display: none; }
        .page.active { display: block; }
        .admin-only { display: none; border: 1px dashed var(--accent); } /* Yönetici Modu */

        /* --- CALENDAR (GRID) --- */
        .cal-wrapper { overflow-x: auto; border-radius: 20px; border: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: 60px repeat(7, 1fr); background: var(--border); gap: 1px; min-width: 650px; }
        .cal-cell { background: var(--bg); height: 45px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
        .cal-head { background: var(--card); color: var(--accent); font-weight: 800; }
        .busy { background: var(--accent) !important; color: black !important; font-weight: 800; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo-area" onclick="app.showPage('home')">
        <div class="logo-box">S</div>
        <b id="txt-logo">Studio Manager Pro</b>
    </div>
    <select class="lang-btn" id="langSelect" onchange="app.changeLang()">
        <option value="tr">🇹🇷 TR</option>
        <option value="en">🇺🇸 EN</option>
    </select>
</div>

<div id="home" class="page container active">
    <div class="dashboard-grid">
        <div class="dash-item" onclick="app.showPage('members')"><span>👥</span><b>Üyeler</b></div>
        <div class="dash-item" onclick="app.showPage('calendar')"><span>📅</span><b>Takvim</b></div>
        <div class="dash-item" onclick="app.showPage('finance')"><span>💰</span><b>Finans</b></div>
        <div class="dash-item" onclick="app.showPage('diet')"><span>🍎</span><b>Diyet</b></div>
        <div class="dash-item" onclick="app.showPage('contact')"><span>📞</span><b>İletişim</b></div>
        <div class="dash-item admin-toggle-btn" onclick="app.unlockAdmin()"><span>⚙️</span><b>Yönetici</b></div>
    </div>
</div>

<div id="members" class="page container">
    <h2>Üye Yönetimi</h2>
    <div class="card">
        <input type="text" id="mName" placeholder="Ad Soyad">
        <input type="tel" id="mPhone" placeholder="Telefon">
        <button class="btn" onclick="app.addMember()">Üye Ekle</button>
    </div>
    <div id="memberList"></div>
</div>

<div id="calendar" class="page container">
    <h2>Haftalık Program</h2>
    <div class="cal-wrapper">
        <div class="cal-grid" id="calGrid"></div>
    </div>
</div>

<div id="finance" class="page container">
    <div class="card" style="background:var(--accent); color:black;">
        <small>TOPLAM KASA</small>
        <h2 style="margin:0;">₺<span id="ciroSpan">0</span></h2>
    </div>
    <div class="card">
        <h4>Ödeme & Seans Yükle</h4>
        <select id="finMem"></select>
        <select id="finPack">
            <option value="4">4 Seans Paketi</option>
            <option value="8">8 Seans Paketi</option>
            <option value="12">12 Seans Paketi</option>
            <option value="24">24 Seans Paketi</option>
        </select>
        <input type="number" id="finAmt" placeholder="Alınan Ücret (₺)">
        <button class="btn" onclick="app.processSale()">Satışı Onayla</button>
    </div>
</div>

<div id="settings" class="page container admin-only" id="adminPanel">
    <h2>Yönetici Paneli</h2>
    <div class="card">
        <h4>Stüdyo Bilgileri</h4>
        <input type="text" id="setStudio" placeholder="Stüdyo İsmi">
        <button class="btn" onclick="app.saveSettings()">Kaydet</button>
    </div>
    <div class="card">
        <h4>Sistem Bakımı</h4>
        <button class="btn" style="background:var(--border); color:white;" onclick="app.exportData()">Veri Yedekle (JSON)</button>
        <button class="btn" style="background:var(--danger); color:white; margin-top:20px;" onclick="app.clearData()">Tüm Verileri Temizle</button>
    </div>
</div>

<div id="diet" class="page container">
    <h2>Beslenme Planları</h2>
    <div id="dietArea"></div>
</div>

<div id="contact" class="page container">
    <h2>İletişim</h2>
    <div class="card">📞 Telefon: 0500 000 00 00</div>
    <div class="card">📸 Instagram: @studiopro</div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="app.showPage('home', this)"><div>🏠</div></div>
    <div class="nav-item" onclick="app.showPage('members', this)"><div>👥</div></div>
    <div class="nav-item" onclick="app.showPage('calendar', this)"><div>📅</div></div>
    <div class="nav-item" onclick="app.showPage('finance', this)"><div>💰</div></div>
    <div class="nav-item admin-nav" style="display:none;" onclick="app.showPage('settings', this)"><div>⚙️</div></div>
</nav>

<script>
const app = {
    db: JSON.parse(localStorage.getItem('sm_pro_v6')) || { 
        members: [], ciro: 0, slots: [], lang: 'tr', 
        settings: { name: 'Studio Manager Pro' }, isAdmin: false 
    },

    init() {
        this.applySettings();
        this.renderMembers();
        this.renderCalendar();
        this.updateCiro();
        if(this.db.isAdmin) this.showAdminUI();
    },

    // --- YÖNETİCİ KİLİDİ ---
    unlockAdmin() {
        const pass = prompt("Yönetici Şifresi:");
        if(pass === "1234") { // Varsayılan şifre
            this.db.isAdmin = true;
            this.save();
            this.showAdminUI();
            alert("Yönetici modu aktif.");
        }
    },

    showAdminUI() {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        document.querySelector('.admin-nav').style.display = 'block';
    },

    showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    },

    addMember() {
        const name = document.getElementById('mName').value;
        if(!name) return;
        this.db.members.push({ id: Date.now(), name, phone: document.getElementById('mPhone').value, sessions: 0 });
        this.save(); this.renderMembers();
        document.getElementById('mName').value = '';
    },

    renderMembers() {
        const list = document.getElementById('memberList');
        const fin = document.getElementById('finMem');
        list.innerHTML = ''; fin.innerHTML = '<option value="">Üye Seç...</option>';
        this.db.members.forEach(m => {
            list.innerHTML += `<div class="card"><b>${m.name}</b><br><small>Kalan Seans: ${m.sessions}</small></div>`;
            fin.innerHTML += `<option value="${m.id}">${m.name}</option>`;
        });
    },

    processSale() {
        const mId = document.getElementById('finMem').value;
        const pack = parseInt(document.getElementById('finPack').value);
        const amt = parseInt(document.getElementById('finAmt').value || 0);
        if(!mId) return;
        
        const member = this.db.members.find(x => x.id == mId);
        member.sessions += pack;
        this.db.ciro += amt;
        this.save();
        this.renderMembers();
        this.updateCiro();
        alert("Paket yüklendi ve kasa güncellendi.");
    },

    renderCalendar() {
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        const heads = ['Saat', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
        heads.forEach(h => grid.innerHTML += `<div class="cal-cell cal-head">${h}</div>`);
        for(let h = 9; h <= 20; h++) {
            grid.innerHTML += `<div class="cal-cell" style="color:var(--muted)">${h}:00</div>`;
            for(let d = 1; d <= 7; d++) {
                const id = `${d}-${h}`;
                const isBusy = this.db.slots.includes(id);
                grid.innerHTML += `<div class="cal-cell ${isBusy?'busy':''}" onclick="app.toggleSlot('${id}')">${isBusy?'DOLU':''}</div>`;
            }
        }
    },

    toggleSlot(id) {
        if(this.db.slots.includes(id)) this.db.slots = this.db.slots.filter(s => s !== id);
        else this.db.slots.push(id);
        this.save(); this.renderCalendar();
    },

    updateCiro() { document.getElementById('ciroSpan').innerText = this.db.ciro.toLocaleString(); },
    save() { localStorage.setItem('sm_pro_v6', JSON.stringify(this.db)); },
    applySettings() { document.getElementById('txt-logo').innerText = this.db.settings.name; },
    saveSettings() { 
        this.db.settings.name = document.getElementById('setStudio').value; 
        this.save(); location.reload(); 
    },
    clearData() { if(confirm("Tüm veriler silinecek?")) { localStorage.clear(); location.reload(); } }
};
app.init();
</script>
</body>
</html>
