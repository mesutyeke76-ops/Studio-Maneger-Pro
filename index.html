<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diamond Pro | Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --accent: #d2fe00;
            --text: #ffffff; --muted: #8e8e93; --border: #2c2c2e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        /* Grid Menü (Resimdeki gibi) */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .menu-btn { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: flex-start; gap: 10px; cursor: pointer; }
        .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Bugünkü Seanslar Kartı */
        .session-item { background: #262629; border-left: 4px solid var(--accent); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        
        /* Alt Navigasyon */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--muted); font-size: 11px; text-align: center; }
        .nav-btn.active { color: var(--accent); }
        .plus-btn { width: 55px; height: 55px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 28px; margin-top: -40px; border: 5px solid var(--bg); box-shadow: 0 4px 15px rgba(210, 254, 0, 0.3); }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, select, textarea { width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; border: 1px solid var(--border); background: #262629; color: white; }
        .btn { width: 100%; padding: 16px; margin-top: 15px; border-radius: 16px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-home" class="page container active">
    <div class="header">
        <div>
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:40px; height:40px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:800;">D</div>
                <div><h3 style="margin:0">Diamond Pro</h3><small style="color:var(--muted)">Hoş geldin, Yönetici</small></div>
            </div>
        </div>
        <div style="font-size:20px;">🔔</div>
    </div>

    <div class="grid-menu">
        <div class="menu-btn" onclick="app.showPage('page-members')">
            <div class="icon-box" style="background:rgba(210,254,0,0.1); color:var(--accent);">👥</div>
            <b>Üyeler</b>
        </div>
        <div class="menu-btn" onclick="app.showPage('page-calendar')">
            <div class="icon-box" style="background:rgba(255,184,0,0.1); color:#ffb800;">📅</div>
            <b>Seanslar</b>
        </div>
        <div class="menu-btn" onclick="app.showPage('page-finance')">
            <div class="icon-box" style="background:rgba(0,122,255,0.1); color:#007aff;">💰</div>
            <b>Finans</b>
        </div>
        <div class="menu-btn">
            <div class="icon-box" style="background:rgba(175,82,222,0.1); color:#af52de;">🏋️</div>
            <b>Eğitmenler</b>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Bugünkü Seanslar</h3>
        <small style="color:var(--accent)">Takvim ></small>
    </div>
    <div id="sessionList">
        <div class="session-item"><b>Mahmut Tozkoparan</b><br><small style="color:var(--muted)">10:05 - 11:05</small></div>
        <div class="session-item"><b>Nur Genç</b><br><small style="color:var(--muted)">12:05 - 13:05</small></div>
    </div>
</div>

<div id="page-finance" class="page container">
    <h3>Aylık Ciro</h3>
    <div class="card">
        <canvas id="finChart" style="height:200px;"></canvas>
    </div>
    <div class="card">
        <h4>Yeni Ödeme Al</h4>
        <input type="number" id="revInp" placeholder="Tutar (₺)">
        <button class="btn" onclick="app.addRev()">Geliri Kaydet</button>
    </div>
</div>

<div id="page-diet" class="page container">
    <h3 style="text-align:center">Kalori Takibi</h3>
    <div class="card" style="text-align:center">
        <div style="font-size:40px; font-weight:800; color:var(--accent);" id="calDisplay">1800</div>
        <small>Hedef: 2136 kal</small>
    </div>
    <div class="card">
        <h4>Diyet Listesi Seç</h4>
        <select onchange="app.setDiet(this.value)">
            <option value="1200">1200 Kalori</option>
            <option value="1500">1500 Kalori</option>
            <option value="1800" selected>1800 Kalori</option>
        </select>
        <div id="dietNote" style="margin-top:20px; color:var(--muted); font-size:14px; white-space:pre-line;"></div>
    </div>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="app.showPage('page-home', this)">🏠<br>Ana Sayfa</button>
    <button class="nav-btn" onclick="app.showPage('page-diet', this)">🍎<br>Beslenme</button>
    <div class="plus-btn">＋</div>
    <button class="nav-btn" onclick="app.showPage('page-calendar', this)">📅<br>Takvim</button>
    <button class="nav-btn">👤<br>Profil</button>
</nav>

<script>
const app = {
    showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        if(id === 'page-finance') this.initChart();
    },

    setDiet(val) {
        document.getElementById('calDisplay').innerText = val;
        const diets = {
            "1200": "Sabah: 1 Yumurta, Lor Peyniri\nÖğle: 100g Tavuk, Salata\nAkşam: Sebze Çorbası",
            "1500": "Sabah: 2 Yumurta, Zeytin, Tam Buğday\nÖğle: 150g Et, Pilav, Yoğurt\nAkşam: Zeytinyağlı Yemek",
            "1800": "Sabah: 3 Yumurta, Peynir, Yulaf\nÖğle: 200g Tavuk, Makarna, Salata\nAkşam: Izgara Balık, Sebze"
        };
        document.getElementById('dietNote').innerText = diets[val];
    },

    initChart() {
        const ctx = document.getElementById('finChart').getContext('2d');
        if(window.mChart) window.mChart.destroy();
        window.mChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['May', 'Haz', 'Tem', 'Ağu', 'Eyl'],
                datasets: [{ label: 'Ciro', data: [8000, 12000, 9500, 15000, 10400], borderColor: '#d2fe00', tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    }
};
// Başlangıç diyetini yükle
app.setDiet("1800");
</script>
</body>
</html>
