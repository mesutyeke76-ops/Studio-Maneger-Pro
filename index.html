<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diamond Pro | Studio Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --accent: #d2fe00; --text: #ffffff; --muted: #8e8e93; --border: #2c2c2e; --red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        /* Logo & Header */
        .brand-header { cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 20px; }
        .logo-square { width: 45px; height: 45px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: black; font-weight: 800; font-size: 24px; box-shadow: 0 0 20px rgba(210, 254, 0, 0.3); }

        /* Navigation */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 9999; }
        .nav-btn { background: none; border: none; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--accent); }

        /* Calendar */
        .cal-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .cal-container { overflow-x: auto; border-radius: 15px; border: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: 70px repeat(7, 1fr); background: var(--border); gap: 1px; min-width: 700px; }
        .cal-cell { background: var(--bg); height: 50px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); }
        .cal-header { background: var(--card); color: var(--accent); font-weight: 800; height: 40px; }
        .busy { background: var(--accent) !important; color: black !important; font-weight: 800; }

        input, select, textarea { width: 100%; padding: 15px; margin-top: 8px; border-radius: 12px; border: 1px solid var(--border); background: #262629; color: white; font-size: 15px; }
        .btn { width: 100%; padding: 16px; margin-top: 10px; border-radius: 16px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .diet-day-card { background: #262629; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

<header class="brand-header" onclick="app.showPage('page-home')">
    <div class="logo-square">D</div>
    <h2 style="margin:0; letter-spacing: -1px;">Diamond Pro</h2>
</header>

<div id="page-home" class="page container active">
    <div class="card" style="text-align:center; padding: 40px 20px;">
        <div class="logo-square" style="width:80px; height:80px; font-size:40px; margin: 0 auto 20px;">D</div>
        <h1 style="margin:0;">Hoş Geldiniz</h1>
        <p style="color:var(--muted);">Stüdyonuzu yönetmek için aşağıdan bir işlem seçin.</p>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="card" onclick="app.showPage('page-members')" style="cursor:pointer; text-align:center;">👥<br>Üyeler</div>
        <div class="card" onclick="app.showPage('page-finance')" style="cursor:pointer; text-align:center;">💰<br>Ödemeler</div>
        <div class="card" onclick="app.showPage('page-calendar')" style="cursor:pointer; text-align:center;">📅<br>Takvim</div>
        <div class="card" onclick="app.showPage('page-diet')" style="cursor:pointer; text-align:center;">🍎<br>Diyet</div>
    </div>
</div>

<div id="page-members" class="page container">
    <h3>Üye Kayıt & Takip</h3>
    <div class="card">
        <input type="text" id="mName" placeholder="Ad Soyad">
        <button class="btn" onclick="app.addMember()">Üye Ekle</button>
    </div>
    <div id="memberList"></div>
</div>

<div id="page-finance" class="page container">
    <h3>Finansal İşlemler</h3>
    <div class="card">
        <small style="color:var(--muted)">Toplam Ciro</small>
        <h2 style="color:var(--accent); font-size:32px; margin:5px 0;">₺<span id="totalCiro">0</span></h2>
    </div>

    <div class="card">
        <h4>Ödeme Al & Seans Yükle</h4>
        <select id="payMemberSelect"></select>
        <select id="payPackSelect">
            <option value="4">4 Seans Paket</option>
            <option value="8">8 Seans Paket</option>
            <option value="12">12 Seans Paket</option>
            <option value="16">16 Seans Paket</option>
        </select>
        <input type="number" id="payAmount" placeholder="Alınan Ücret (₺)">
        <button class="btn" onclick="app.processPayment()">Ödemeyi Onayla</button>
    </div>
</div>

<div id="page-calendar" class="page container">
    <h3>Ders Takvimi</h3>
    <div class="cal-controls">
        <input type="date" id="calDate" onchange="app.renderCalendar()">
    </div>
    <div class="cal-container">
        <div class="cal-grid" id="calGrid"></div>
    </div>
</div>

<div id="page-diet" class="page container">
    <h3>Genişletilmiş Diyet Planı</h3>
    <select id="dietPlanSelect" onchange="app.renderDiet()">
        <option value="1500">1500 Kalori (Haftalık Plan)</option>
        <option value="2000">2000 Kalori (Haftalık Plan)</option>
    </select>
    <div id="dietResult" style="margin-top:20px;"></div>
</div>

<nav class="nav">
    <button class="nav-btn active" id="n-home" onclick="app.showPage('page-home', this)">🏠<br>Ana Sayfa</button>
    <button class="nav-btn" onclick="app.showPage('page-members', this)">👥<br>Üyeler</button>
    <button class="nav-btn" onclick="app.showPage('page-calendar', this)">📅<br>Takvim</button>
    <button class="nav-btn" onclick="app.showPage('page-finance', this)">💰<br>Finans</button>
    <button class="nav-btn" onclick="app.showPage('page-diet', this)">🍎<br>Diyet</button>
</nav>

<script>
const app = {
    db: JSON.parse(localStorage.getItem('diamond_pro_v4')) || { members: [], ciro: 0, busySlots: {} },

    init() {
        // Takvim için bugünün tarihini set et
        document.getElementById('calDate').valueAsDate = new Date();
        this.renderMembers();
        this.renderDiet();
    },

    showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        if(id === 'page-calendar') this.renderCalendar();
        if(id === 'page-finance') this.updateFinanceUI();
    },

    addMember() {
        const name = document.getElementById('mName').value.trim();
        if(!name) return;
        this.db.members.push({ id: Date.now(), name, sessions: 0 });
        this.save();
        this.renderMembers();
        document.getElementById('mName').value = '';
    },

    renderMembers() {
        const list = document.getElementById('memberList');
        const sel = document.getElementById('payMemberSelect');
        list.innerHTML = ''; sel.innerHTML = '<option value="">Üye Seç...</option>';
        this.db.members.forEach(m => {
            list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${m.name}</b><br><small>${m.sessions} Seans</small></div>
                <button class="btn" style="width:auto; padding:8px 15px; margin:0;" onclick="app.dropSession(${m.id})">Derse Gir</button>
            </div>`;
            sel.innerHTML += `<option value="${m.id}">${m.name}</option>`;
        });
    },

    dropSession(id) {
        const m = this.db.members.find(x => x.id === id);
        if(m && m.sessions > 0) { m.sessions--; this.save(); this.renderMembers(); }
        else alert("Seans kalmadı!");
    },

    processPayment() {
        const mId = document.getElementById('payMemberSelect').value;
        const count = parseInt(document.getElementById('payPackSelect').value);
        const amount = parseInt(document.getElementById('payAmount').value);
        if(!mId || !amount) return alert("Bilgileri eksiksiz girin!");
        
        const m = this.db.members.find(x => x.id == mId);
        m.sessions += count;
        this.db.ciro += amount;
        this.save();
        this.renderMembers();
        this.updateFinanceUI();
        alert("Ödeme alındı ve seans yüklendi.");
    },

    updateFinanceUI() {
        document.getElementById('totalCiro').innerText = this.db.ciro.toLocaleString();
    },

    renderCalendar() {
        const date = document.getElementById('calDate').value;
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        const headers = ['Saat', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
        headers.forEach(h => grid.innerHTML += `<div class="cal-cell cal-header">${h}</div>`);

        for(let h = 7; h <= 22; h++) {
            grid.innerHTML += `<div class="cal-cell" style="color:white; font-weight:bold;">${h}:00</div>`;
            for(let d = 1; d <= 7; d++) {
                const slotId = `${date}-${d}-${h}`;
                const busy = this.db.busySlots[slotId];
                grid.innerHTML += `<div class="cal-cell ${busy?'busy':''}" onclick="app.toggleSlot('${slotId}')">${busy?'DOLU':''}</div>`;
            }
        }
    },

    toggleSlot(id) {
        this.db.busySlots[id] = !this.db.busySlots[id];
        this.save();
        this.renderCalendar();
    },

    renderDiet() {
        const cal = document.getElementById('dietPlanSelect').value;
        const res = document.getElementById('dietResult');
        const days = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi', 'Pazar'];
        res.innerHTML = `<h4>${cal} Kalori Haftalık Plan</h4>`;
        days.forEach(day => {
            res.innerHTML += `<div class="diet-day-card">
                <b>${day}</b><br>
                <small>Kahvaltı: Yulaf, Yumurta | Öğle: Tavuk Izgara | Akşam: Sebze Yemeği</small>
            </div>`;
        });
    },

    save() { localStorage.setItem('diamond_pro_v4', JSON.stringify(this.db)); }
};

app.init();
</script>
</body>
</html>
