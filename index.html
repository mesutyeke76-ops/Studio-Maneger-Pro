<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Manager Pro - V33</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2, h3 { color: var(--primary); text-align: center; margin-top: 0; }
        .card { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .checkin-btn { background: var(--success); font-size: 1.2em; }
        .hidden { display: none; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.8em; background: #e8f4fd; color: var(--accent); font-weight: bold; }
        .member-data { text-align: center; margin: 20px 0; }
        .member-data h1 { font-size: 3em; margin: 10px 0; color: var(--primary); }
        .logout-btn { background: #95a5a6; margin-top: 30px; font-size: 0.9em; }
        .admin-section { border-top: 2px dashed #eee; margin-top: 20px; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h2>Studio Manager Pro</h2>
        <p style="text-align: center; color: #666;">Üye girişi için telefon numaranızı yazın</p>
        <input type="tel" id="loginPhone" placeholder="05XX XXX XX XX" maxlength="11">
        <button onclick="app.login()">Giriş Yap</button>
        <p onclick="app.toggleAdmin()" style="text-align:center; font-size:12px; color:blue; cursor:pointer; text-decoration:underline;">Yönetici Paneli</p>
    </div>

    <div id="memberPanel" class="hidden">
        <div class="status-badge">Üye Profili</div>
        <h3 id="welcomeName">Hoş Geldiniz</h3>
        <div class="member-data">
            <p>Kalan Ders Saatiniz</p>
            <h1 id="displayBalance">0</h1>
        </div>
        <button class="checkin-btn" onclick="app.doCheckIn()">Dersi Başlat / Check-in</button>
        <button class="logout-btn" onclick="app.logout()">Güvenli Çıkış</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h3>Yönetici Kontrolü</h3>
        <div class="card">
            <input type="text" id="newName" placeholder="Üye Adı Soyadı">
            <input type="tel" id="newPhone" placeholder="Telefon (05XXXXXXXXX)">
            <input type="number" id="newBalance" placeholder="Yüklenecek Ders Sayısı">
            <button onclick="app.addMember()" style="background:var(--primary)">Üyeyi Sisteme Kaydet</button>
        </div>
        <div id="adminList"></div>
        <button onclick="app.toggleAdmin()" class="logout-btn">Kapat</button>
    </div>
</div>

<script>
const app = {
    // Verileri LocalStorage'dan Çek
    db: JSON.parse(localStorage.getItem('studio_v33_db')) || {
        members: []
    },

    init: function() {
        const session = localStorage.getItem('studio_session');
        if (session) {
            this.showMember(JSON.parse(session));
        }
    },

    saveDB: function() {
        localStorage.setItem('studio_v33_db', JSON.stringify(this.db));
    },

    login: function() {
        const phone = document.getElementById('loginPhone').value.trim();
        const member = this.db.members.find(m => m.phone === phone);

        if (member) {
            localStorage.setItem('studio_session', JSON.stringify(member));
            this.showMember(member);
        } else {
            alert("Üye bulunamadı! Lütfen kayıt yaptırın.");
        }
    },

    showMember: function(member) {
        // En güncel veriyi DB'den al (Session eski kalmış olabilir)
        const currentMember = this.db.members.find(m => m.phone === member.phone);
        
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('memberPanel').classList.remove('hidden');
        
        document.getElementById('welcomeName').innerText = `Merhaba, ${currentMember.name}`;
        document.getElementById('displayBalance').innerText = currentMember.balance;
    },

    doCheckIn: function() {
        const session = JSON.parse(localStorage.getItem('studio_session'));
        const index = this.db.members.findIndex(m => m.phone === session.phone);

        if (this.db.members[index].balance > 0) {
            this.db.members[index].balance -= 1; // 1 ders düş
            this.saveDB(); // Kalıcı olarak kaydet
            this.showMember(this.db.members[index]); // Ekranı güncelle
            alert("Check-in başarılı! İyi dersler.");
        } else {
            alert("Yetersiz bakiye! Lütfen yeni paket satın alın.");
        }
    },

    addMember: function() {
        const name = document.getElementById('newName').value;
        const phone = document.getElementById('newPhone').value;
        const balance = parseInt(document.getElementById('newBalance').value) || 0;

        if (name && phone) {
            this.db.members.push({ name, phone, balance });
            this.saveDB();
            this.renderAdminList();
            alert("Üye Kaydedildi!");
            document.getElementById('newName').value = "";
            document.getElementById('newPhone').value = "";
            document.getElementById('newBalance').value = "";
        }
    },

    renderAdminList: function() {
        const list = document.getElementById('adminList');
        list.innerHTML = "<strong>Üye Listesi:</strong>";
        this.db.members.forEach(m => {
            list.innerHTML += `<div style="font-size:13px; margin:5px 0; border-bottom:1px solid #eee">
                ${m.name} | ${m.phone} | <b>${m.balance} Ders</b>
            </div>`;
        });
    },

    toggleAdmin: function() {
        const panel = document.getElementById('adminPanel');
        if(panel.classList.contains('hidden')) {
            panel.classList.remove('hidden');
            document.getElementById('loginSection').classList.add('hidden');
            this.renderAdminList();
        } else {
            panel.classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }
    },

    logout: function() {
        localStorage.removeItem('studio_session');
        location.reload();
    }
};

app.init();
</script>

</body>
</html>
