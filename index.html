<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diamond Pro | Studio Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --accent: #d2fe00; --text: #ffffff; --muted: #8e8e93; --border: #2c2c2e; --red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 100px; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        /* Form Elemanları */
        input, select { width: 100%; padding: 15px; margin-top: 8px; border-radius: 12px; border: 1px solid var(--border); background: #262629; color: white; font-size: 15px; }
        .btn { width: 100%; padding: 16px; margin-top: 10px; border-radius: 16px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; font-size: 16px; }
        .btn-danger { background: var(--red); color: white; padding: 8px 15px; border-radius: 10px; font-size: 12px; }
        .btn-action { background: #007aff; color: white; padding: 8px 15px; border-radius: 10px; font-size: 12px; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 9999; }
        .nav-btn { background: none; border: none; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; width: 20%; }
        .nav-btn.active { color: var(--accent); }

        /* Takvim */
        .cal-container { overflow-x: auto; border-radius: 15px; border: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: 70px repeat(7, 1fr); background: var(--border); gap: 1px; min-width: 700px; }
        .cal-cell { background: var(--bg); height: 50px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--muted); }
        .cal-header { background: var(--card); color: var(--accent); font-weight: 800; height: 40px; }
        .busy { background: var(--accent) !important; color: black !important; font-weight: 800; }

        .page { display: none; }
        .page.active { display: block; }

        .member-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #262629; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="page-members" class="page container active">
    <h2 style="margin-bottom:5px;">Üye Yönetimi</h2>
    <p style="color:var(--muted); font-size:14px; margin-bottom:20px;">İşletmenizdeki aktif üye ve seans takibi.</p>
    
    <div class="card">
        <h4 style="margin:0">Yeni Üye Ekle</h4>
        <input type="text" id="mName" placeholder="Adı Soyadı">
        <button class="btn" onclick="app.addMember()">Sisteme Tanımla</button>
    </div>

    <div id="memberList">
        </div>
</div>

<div id="page-finance" class="page container">
    <h2>Finansal Takip</h2>
    <div class="stats">
        <div class="stat-card">
            <small style="color:var(--muted)">Toplam Ciro</small>
            <div style="font-size:20px; font-weight:800; color:var(--accent); margin-top:5px;">₺<span id="totalCiro">0</span></div>
        </div>
        <div class="stat-card">
            <small style="color:var(--muted)">Satış Adedi</small>
            <div style="font-size:20px; font-weight:800; margin-top:5px;" id="salesCount">0</div>
        </div>
    </div>

    <div class="card">
        <canvas id="financeChart" style="max-height:180px;"></canvas>
    </div>

    <div class="card">
        <h4>Paket Satışı Tanımla</h4>
        <select id="saleMemberSelect"></select>
        <select id="packSelect">
            <option value="4|4000">4 Seans Paket (₺4.000)</option>
            <option value="8|7500">8 Seans Paket (₺7.500)</option>
            <option value="12|10500">12 Seans Paket (₺10.500)</option>
            <option value="16|13000">16 Seans Paket (₺13.000)</option>
        </select>
        <button class="btn" onclick="app.processSale()">Ödemeyi Al ve Seans Yükle</button>
    </div>
</div>

<div id="page-calendar" class="page container">
    <h2>Ders Programı</h2>
    <p style="color:var(--muted); font-size:12px;">Hücrelere dokunarak doluluk durumunu güncelleyin.</p>
    <div class="cal-container">
        <div class="cal-grid" id="calGrid"></div>
    </div>
</div>

<div id="page-diet" class="page container">
    <h2>Diyet & Beslenme</h2>
    <div class="card">
        <h4>Hazır Şablon Atama</h4>
        <select id="dietSelect" onchange="app.updateDiet()">
            <option value="">Liste Seçiniz...</option>
            <option value="1200">1200 Kalori Planı</option>
            <option value="1500">1500 Kalori Planı</option>
            <option value="1800">1800 Kalori Planı</option>
            <option value="2200">2200 Kalori Planı</option>
        </select>
        <div id="dietText" style="margin-top:20px; padding:15px; background:#262629; border-radius:12px; color:var(--accent); font-size:14px; white-space:pre-line;">
            Lütfen yukarıdan bir plan seçin.
        </div>
    </div>
</div>

<nav class="nav">
    <button class="nav-btn active" onclick="app.showPage('page-members', this)">👥<br>Üyeler</button>
    <button class="nav-btn" onclick="app.showPage('page-finance', this)">💰<br>Finans</button>
    <button class="nav-btn" onclick="app.showPage('page-calendar', this)">📅<br>Takvim</button>
    <button class="nav-btn" onclick="app.showPage('page-diet', this)">🍎<br>Diyet</button>
</nav>

<script>
const app = {
    // Tüm veriler tarayıcıya (localStorage) kayıt edilir.
    db: JSON.parse(localStorage.getItem('diamond_enterprise_db')) || {
        members: [],
        ciro: 0,
        salesCount: 0,
        busySlots: []
    },

    init() {
        this.renderMembers();
        this.renderCalendar();
    },

    showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        if(id === 'page-finance') this.renderFinance();
    },

    // ÜYE FONKSİYONLARI
    addMember() {
        const name = document.getElementById('mName').value.trim();
        if(!name) return alert("Lütfen isim girin.");
        this.db.members.push({ id: Date.now(), name: name, sessions: 0 });
        this.save();
        this.renderMembers();
        document.getElementById('mName').value = '';
    },

    deleteMember(id) {
        if(!confirm("Bu üyeyi ve tüm kayıtlarını silmek istediğinize emin misiniz?")) return;
        this.db.members = this.db.members.filter(m => m.id !== id);
        this.save();
        this.renderMembers();
    },

    adjustSession(id, amount) {
        const m = this.db.members.find(m => m.id === id);
        if(m && (m.sessions + amount) >= 0) {
            m.sessions += amount;
            this.save();
            this.renderMembers();
        }
    },

    renderMembers() {
        const list = document.getElementById('memberList');
        const sel = document.getElementById('saleMemberSelect');
        list.innerHTML = this.db.members.length === 0 ? '<p style="color:var(--muted); text-align:center;">Henüz üye eklenmemiş.</p>' : '';
        sel.innerHTML = '<option value="">Üye Seç...</option>';

        this.db.members.forEach(m => {
            list.innerHTML += `
                <div class="member-row">
                    <div>
                        <div style="font-weight:800;">${m.name}</div>
                        <div style="color:var(--accent); font-size:12px; font-weight:600;">${m.sessions} Seans Mevcut</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-action" onclick="app.adjustSession(${m.id}, -1)">Ders Yapıldı</button>
                        <button class="btn-danger" onclick="app.deleteMember(${m.id})">Sil</button>
                    </div>
                </div>`;
            sel.innerHTML += `<option value="${m.id}">${m.name}</option>`;
        });
    },

    // FİNANS FONKSİYONLARI
    processSale() {
        const mId = document.getElementById('saleMemberSelect').value;
        const [count, price] = document.getElementById('packSelect').value.split('|').map(Number);
        if(!mId) return alert("Lütfen bir üye seçin.");

        const member = this.db.members.find(m => m.id == mId);
        member.sessions += count;
        this.db.ciro += price;
        this.db.salesCount += 1;
        
        this.save();
        this.renderMembers();
        this.renderFinance();
        alert(`Başarılı! ${member.name} hesabına ${count} seans eklendi.`);
    },

    renderFinance() {
        document.getElementById('totalCiro').innerText = this.db.ciro.toLocaleString();
        document.getElementById('salesCount').innerText = this.db.salesCount;
        
        const ctx = document.getElementById('financeChart').getContext('2d');
        if(window.fChart) window.fChart.destroy();
        window.fChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Toplam Gelir'],
                datasets: [{ data: [this.db.ciro], backgroundColor: '#d2fe00', borderRadius: 10 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, display: false } } }
        });
    },

    // TAKVİM FONKSİYONLARI
    renderCalendar() {
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        const days = ['Saat', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
        days.forEach(d => grid.innerHTML += `<div class="cal-cell cal-header">${d}</div>`);

        for(let h = 7; h <= 22; h++) {
            grid.innerHTML += `<div class="cal-cell" style="font-weight:bold; color:white;">${h<10?'0'+h:h}:00</div>`;
            for(let d = 1; d <= 7; d++) {
                const slotId = `${d}-${h}`;
                const isBusy = this.db.busySlots.includes(slotId);
                grid.innerHTML += `<div id="slot-${slotId}" class="cal-cell ${isBusy?'busy':''}" onclick="app.toggleSlot('${slotId}')">${isBusy?'DOLU':''}</div>`;
            }
        }
    },

    toggleSlot(id) {
        if(this.db.busySlots.includes(id)) {
            this.db.busySlots = this.db.busySlots.filter(s => s !== id);
        } else {
            this.db.busySlots.push(id);
        }
        this.save();
        this.renderCalendar();
    },

    // DİYET FONKSİYONLARI
    updateDiet() {
        const val = document.getElementById('dietSelect').value;
        const plans = {
            "1200": "• KAHVALTI: 1 Yumurta, 1 Dilim Beyaz Peynir, Mevsim Yeşilliği\n• ÖĞLE: 100g Izgara Tavuk, Mevsim Salata\n• AKŞAM: 6 Kaşık Sebze Yemeği, 1 Kase Yoğurt",
            "1500": "• KAHVALTI: 2 Yumurta, 2 Dilim Peynir, 1 Dilim Tam Buğday Ekmeği\n• ÖĞLE: 150g Köfte veya Kırmızı Et, 3 Kaşık Esmer Pirinç\n• AKŞAM: Zeytinyağlı Sebze, 1 Kase Yoğurt, Çeyrek Ekmek",
            "1800": "• KAHVALTI: 3 Yumurta, Zeytin, Peynir, Yulaf Ezmesi\n• ÖĞLE: 200g Tavuk Göğsü, 1 Porsiyon Makarna veya Pilav\n• AKŞAM: 200g Balık veya Et, Izgara Sebze, Ayran",
            "2200": "• KAHVALTI: 4 Yumurta, Bol Peynir, Ceviz, Bal, Tam Tahıllı Ekmek\n• ÖĞLE: 250g Et, Bol Pilav, Yoğurt, Salata\n• ARA ÖĞÜN: Kuruyemiş ve Meyve\n• AKŞAM: Baklagil Yemeği, Pilav, Cacık"
        };
        document.getElementById('dietText').innerText = plans[val] || "Lütfen bir plan seçin.";
    },

    save() { localStorage.setItem('diamond_enterprise_db', JSON.stringify(this.db)); }
};

app.init();
</script>
</body>
</html>
